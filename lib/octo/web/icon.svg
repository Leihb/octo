<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- White circle background -->
  <circle cx="50" cy="50" r="50" fill="#ffffff"/>

  <!-- Gradient ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#ring)" stroke-width="8"/>

  <!-- Octopus head -->
  <ellipse cx="50" cy="42" rx="14" ry="12" fill="#1e1e2e"/>

  <!-- Eyes -->
  <circle cx="45" cy="40" r="3" fill="#ffffff"/>
  <circle cx="55" cy="40" r="3" fill="#ffffff"/>

  <!-- Tentacles -->
  <path d="M 38,52 Q 32,62 30,72" fill="none" stroke="#1e1e2e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 44,54 Q 42,66 40,76" fill="none" stroke="#1e1e2e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 50,54 Q 50,66 50,76" fill="none" stroke="#1e1e2e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 56,54 Q 58,66 60,76" fill="none" stroke="#1e1e2e" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 62,52 Q 68,62 70,72" fill="none" stroke="#1e1e2e" stroke-width="3.5" stroke-linecap="round"/>
</svg>